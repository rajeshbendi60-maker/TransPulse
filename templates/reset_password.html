{% extends "base.html" %}
{% block title %}TransPulse | Reset Password{% endblock %}
{% block content %}

<div class="container py-4 fade-in-content position-relative">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card glass-login-card p-4 p-md-5 shadow-lg border-info border-opacity-25" style="background: rgba(11,29,54,0.75); backdrop-filter: blur(15px); border-radius: 20px;">
                <div class="text-center mb-4 pb-2">
                    <h2 class="text-white fw-bold mb-1">Reset Password</h2>
                    <p class="text-info small mb-0 fw-semibold">Passenger account recovery</p>
                </div>

                <form method="post" action="{{ url_for('reset_password', token=token) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label text-info fw-bold small">New Password</label>
                        <input type="password" name="password" id="reset-password" class="form-control bg-dark text-white border-info shadow-none" minlength="{{ min_length }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-info fw-bold small">Confirm Password</label>
                        <input type="password" name="confirm_password" id="reset-confirm-password" class="form-control bg-dark text-white border-info shadow-none" minlength="{{ min_length }}" required>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input border-info" type="checkbox" id="show-reset-passwords" onclick="document.getElementById('reset-password').type = this.checked ? 'text' : 'password'; document.getElementById('reset-confirm-password').type = this.checked ? 'text' : 'password';">
                        <label class="form-check-label small text-muted ms-1 fw-semibold" for="show-reset-passwords">Show Passwords</label>
                    </div>

                    <button type="submit" class="btn btn-info w-100 fw-bold shadow-sm text-dark rounded-pill py-2 mb-3" style="font-size: 1.05rem;">Update Password</button>
                </form>

                <div class="text-center border-top border-secondary pt-3">
                    <small class="text-muted fw-semibold"><a href="{{ url_for('login_page') }}" class="text-info fw-bold text-decoration-none">Back to login</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
