{% extends "base.html" %}
{% block title %}TransPulse | Admin Docs{% endblock %}
{% block content %}
<div class="container pb-5">
    <div class="d-flex align-items-center mb-4 mt-3">
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-info me-3 px-4 rounded-pill fw-bold text-white">Back</a>
        <div>
            <h2 class="fw-bold mb-1 text-white">Admin Documentation</h2>
            <p class="text-muted mb-0">{{ current_doc }}</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-3">
            <div class="list-group">
                {% for doc in allowed_files %}
                    <a class="list-group-item list-group-item-action bg-dark text-light border-secondary {% if doc == current_doc %}active{% endif %}" href="{{ url_for('admin_docs', filename=doc) }}">
                        {{ doc }}
                    </a>
                {% endfor %}
            </div>
        </div>
        <div class="col-lg-9">
            <article class="card bg-dark text-light border-secondary">
                <div class="card-body documentation-body">
                    {{ html_content | safe }}
                </div>
            </article>
        </div>
    </div>
</div>
{% endblock %}
