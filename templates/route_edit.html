{% extends "base.html" %}
{% block title %}TransPulse | Edit Route{% endblock %}
{% block content %}
<div class="container">
    <h2 class="fw-bold mb-1">Edit Route</h2>
    <p class="text-muted mb-4">Update route details.</p>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form method="post" action="{{ url_for('edit_route', route_id=route.id) }}" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Route Code</label>
                    <input class="form-control" name="route_code" value="{{ route.route_code }}" placeholder="e.g. 01004" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Name</label>
                    <input class="form-control" name="name" value="{{ route.name }}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Origin</label>
                    <input class="form-control" name="origin" value="{{ route.origin }}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Destination</label>
                    <input class="form-control" name="destination" value="{{ route.destination }}" required>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Save Changes</button>
                    <a href="{{ url_for('admin_routes') }}" class="btn btn-outline-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
