{% extends "base.html" %}
{% block title %}TransPulse | Forgot Password{% endblock %}
{% block content %}

<div class="container py-4 fade-in-content position-relative">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card glass-login-card p-4 p-md-5 shadow-lg border-info border-opacity-25" style="background: rgba(11,29,54,0.75); backdrop-filter: blur(15px); border-radius: 20px;">
                <div class="text-center mb-4 pb-2">
                    <h2 class="text-white fw-bold mb-1">Forgot Password</h2>
                    <p class="text-info small mb-0 fw-semibold">Passenger account recovery</p>
                </div>

                <form method="post" action="{{ url_for('forgot_password') }}" id="forgot-password-form">
                    <div class="mb-4">
                        <label class="form-label text-info fw-bold small">Registered Email</label>
                        <input type="email" name="email" value="{{ email or '' }}" class="form-control bg-dark text-white border-info shadow-none" placeholder="name@domain.com" required>
                    </div>

                    <button type="submit" id="reset-submit-btn" class="btn btn-info w-100 fw-bold shadow-sm text-dark rounded-pill py-2 mb-3" style="font-size: 1.05rem;">
                        <span id="reset-submit-label">Send Reset Link</span>
                        <span id="reset-submit-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                    </button>
                </form>

                <div class="text-center border-top border-secondary pt-3">
                    <small class="text-muted fw-semibold"><a href="{{ url_for('login_page') }}" class="text-info fw-bold text-decoration-none">Back to login</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('forgot-password-form');
    const button = document.getElementById('reset-submit-btn');
    const label = document.getElementById('reset-submit-label');
    const spinner = document.getElementById('reset-submit-spinner');
    let isSubmitting = false;

    function showResetModal(type, title, message) {
        if (window.TransPulseUtils && typeof window.TransPulseUtils.showPremiumModal === 'function') {
            window.TransPulseUtils.showPremiumModal({
                type,
                title,
                message,
                icon: type === 'danger' ? '&#9888;' : '&#10003;',
                buttonText: 'Got It'
            });
            return;
        }
        let modal = document.getElementById('reset-feedback-modal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'reset-feedback-modal';
            modal.style.cssText = 'display:none; position:fixed; inset:0; z-index:250000; background:rgba(0,0,0,0.84); align-items:center; justify-content:center; padding:18px;';
            document.body.appendChild(modal);
        }
        const accent = type === 'danger' ? '#ff5d6c' : '#34d2ff';
        modal.innerHTML = `
            <div class="card glass-panel shadow-lg" style="width:100%; max-width:430px; border-color:${accent}; border-radius:16px; background:#071d34;">
                <div class="card-body p-4 text-center">
                    <h3 class="text-white fw-bold mb-3">${title}</h3>
                    <p class="text-muted mb-4">${message}</p>
                    <button type="button" class="btn fw-bold px-5 py-2 rounded-pill" style="background:${accent}; color:#03101d; border:0;">Got It</button>
                </div>
            </div>`;
        modal.querySelector('button').addEventListener('click', () => { modal.style.display = 'none'; }, { once: true });
        modal.style.display = 'flex';
    }

    if (!form || !button) return;

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (isSubmitting) return;
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        isSubmitting = true;
        button.disabled = true;
        label.textContent = 'Sending...';
        spinner.classList.remove('d-none');

        try {
            const response = await fetch(form.action, {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest',
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.content || ''
                },
                body: new FormData(form)
            });
            const data = await response.json().catch(() => ({}));
            if (!response.ok || !data.success) {
                throw new Error(data.message || 'Password reset email could not be sent right now.');
            }
            showResetModal('success', 'Reset Link Sent', data.message || 'If that passenger account exists, a reset link has been sent.');
        } catch (error) {
            showResetModal('danger', 'Reset Link Not Sent', error.message || 'Password reset email could not be sent right now.');
        } finally {
            isSubmitting = false;
            button.disabled = false;
            label.textContent = 'Send Reset Link';
            spinner.classList.add('d-none');
        }
    });
});
</script>
{% endblock %}
