<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="tpIconTitle">
    <title id="tpIconTitle">TransPulse merged TP shortcut icon</title>
    <defs>
        <radialGradient id="tp-bg" cx="27%" cy="20%" r="82%">
            <stop offset="0" stop-color="#1a5f8f"/>
            <stop offset="0.28" stop-color="#102f54"/>
            <stop offset="0.58" stop-color="#07182b"/>
            <stop offset="1" stop-color="#04101f"/>
        </radialGradient>
        <linearGradient id="tp-border" x1="88" y1="54" x2="424" y2="458" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#a8fbff"/>
            <stop offset="0.42" stop-color="#4de6ff"/>
            <stop offset="1" stop-color="#1d8fff"/>
        </linearGradient>
        <filter id="stroke-glow" x="-16%" y="-22%" width="132%" height="144%" color-interpolation-filters="sRGB">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.29 0 0 0 0 0.89 0 0 0 0 1 0 0 0 0.44 0"/>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect x="22" y="22" width="468" height="468" rx="92" fill="url(#tp-bg)"/>
    <rect x="36" y="36" width="440" height="440" rx="78" fill="none" stroke="url(#tp-border)" stroke-width="7"/>
    <rect x="52" y="52" width="408" height="408" rx="64" fill="none" stroke="#54e8ff" stroke-width="14" opacity="0.13"/>

    <g filter="url(#stroke-glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M124 164H258M258 164V382M258 164H366C407 164 430 188 430 224C430 258 406 278 366 278H258" stroke="#48e7ff" stroke-width="28" opacity="0.18"/>
        <path d="M124 164H258M258 164V382M258 164H366C407 164 430 188 430 224C430 258 406 278 366 278H258" stroke="#82f4ff" stroke-width="18"/>
    </g>

    <g filter="url(#stroke-glow)">
        <circle cx="124" cy="164" r="15" fill="#07182b" stroke="#f7feff" stroke-width="7"/>
        <circle cx="430" cy="224" r="15" fill="#07182b" stroke="#f7feff" stroke-width="7"/>
        <circle cx="258" cy="382" r="15" fill="#07182b" stroke="#f7feff" stroke-width="7"/>
    </g>
</svg>
