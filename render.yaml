services:
  - type: web
    name: transpulse
    env: python
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: transpulse-db
          property: connectionString

databases:
  - name: transpulse-db
    databaseName: transpulse
    user: transpulse_user
